# Experiment 5 — SmallGraph, fast ticks, PING-heavy traffic, both algorithms
# Key differences from default:
#   - SmallGraph instead of LargeGraph (21 nodes, 20 edges — faster propagation)
#   - Faster tick rate (20ms vs 50ms) — more messages per second
#   - PING-heavy default PDF (0.60) — more health checks, less work
#   - Different seed (42) — different random sequence
#   - Stricter edge overrides — more drops expected
#   - Single timer node (only Node 0)
#   - 30 second run

sim {
  graphFile          = "src/main/resources/graphs/SmallGraph.ngs"
  seed               = 42
  runDurationSeconds = 30

  messages {
    types = [ "CONTROL", "PING", "GOSSIP", "WORK", "ACK" ]
  }

  edgeLabeling {
    default = [ "CONTROL", "PING", "GOSSIP", "WORK" ]
    overrides = [
      # Restrict Node 0's two outgoing edges heavily
      { from = 0, to = 1,  allow = [ "CONTROL", "PING" ] },       # only PING allowed (no GOSSIP/WORK)
      { from = 0, to = 2,  allow = [ "CONTROL", "WORK" ] },       # only WORK allowed (no PING/GOSSIP)
      { from = 1, to = 12, allow = [ "CONTROL", "GOSSIP" ] }      # only GOSSIP allowed
    ]
  }

  traffic {
    tickIntervalMs = 20           # faster ticks — 20ms instead of 50ms
    distribution   = "zipf"
    defaultPdf = [
      { msg = "PING",   p = 0.60 },   # PING-heavy — more health checks
      { msg = "GOSSIP", p = 0.25 },
      { msg = "WORK",   p = 0.15 }
    ]
    perNodePdf = [
      { node = 0, pdf = [
        { msg = "PING",   p = 0.50 },
        { msg = "GOSSIP", p = 0.30 },
        { msg = "WORK",   p = 0.20 }
      ]},
      { node = 1, pdf = [
        { msg = "PING",   p = 0.70 },  # Node 1 is a heavy pinger
        { msg = "GOSSIP", p = 0.20 },
        { msg = "WORK",   p = 0.10 }
      ]}
    ]
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 20, mode = "pdf" }   # only one timer node, faster
    ]
    inputs = [
      { node = 1 },    # Node 1 as input node
      { node = 2 }
    ]
  }

  algorithms {
    initiatorNode = 0
    enableWave    = true
    enableLaiYang = true
  }
}

cinnamon {
  akka.actors = {
    default-by-class {
      includes  = "/user/*"
      report-by = class
    }
  }
}